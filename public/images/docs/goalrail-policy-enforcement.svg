<svg width="780" height="954" viewBox="0 0 780 954" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="780" height="954" rx="28" fill="#111018"/>
  <rect x="32" y="32" width="716" height="890" rx="24" fill="#17151D" stroke="#454052" stroke-width="2"/>
  <text x="72" y="94" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="780" fill="#F4F2F7">Goalrail policy enforcement</text>
  <rect x="72" y="150" width="500" height="94" rx="22" fill="#24202F"/>
  <text x="102" y="188" font-family="Inter, Arial, sans-serif" font-size="17" fill="#F4F2F7">Can you run the test suite?</text>
  <rect x="152" y="286" width="556" height="154" rx="24" fill="#211E31" stroke="#494254"/>
  <text x="188" y="334" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#92D3B5">Soft limit crossed</text>
  <text x="188" y="374" font-family="Inter, Arial, sans-serif" font-size="17" fill="#F4F2F7">Session spend passed $0.01.</text>
  <text x="188" y="406" font-family="Inter, Arial, sans-serif" font-size="15" fill="#A8A4B4">Approve the next tool call or stop it.</text>
  <rect x="188" y="470" width="392" height="54" rx="16" fill="#24202F"/>
  <text x="216" y="504" font-family="Inter, Arial, sans-serif" font-size="16" fill="#F4F2F7">Approved: run tests</text>
  <rect x="152" y="586" width="556" height="174" rx="24" fill="#211E31" stroke="#494254"/>
  <text x="188" y="634" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#FFB4D9">Hard limit reached</text>
  <text x="188" y="674" font-family="Inter, Arial, sans-serif" font-size="17" fill="#F4F2F7">Expensive models are blocked.</text>
  <text x="188" y="706" font-family="Inter, Arial, sans-serif" font-size="15" fill="#A8A4B4">Switch to a cheaper model to continue.</text>
  <rect x="72" y="818" width="636" height="58" rx="18" fill="#24202F" stroke="#494254"/>
  <text x="104" y="854" font-family="Inter, Arial, sans-serif" font-size="16" fill="#A8A4B4">Ask Goalrail anything...</text>
</svg>
